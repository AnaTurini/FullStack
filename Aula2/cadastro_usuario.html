<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Usuário</title>
    <link rel="stylesheet" href="design.css">
</head>
<body>
    <div class="cadastro">
        <h1>Cadastro</h1>
        <p class="sub">Crie sua conta de acesso ao sistema.</p>

        <form action="/cadastrar_usuario_carros" method="POST">
            <div class="field">
                <label>Nome</label>
                <input type="text" name="nome" placeholder="Seu nome completo" required>
            </div>
            <div class="field">
                <label>Login</label>
                <input type="text" name="login" placeholder="Seu login" required>
            </div>
            <div class="field">
                <label>Senha</label>
                <input type="password" name="senha" placeholder="Sua senha" required>
            </div>
            <button type="submit">Criar Conta</button>
        </form>

        <a href="login_usuario.html" class="link">Já tem cadastro? <span>Faça login</span></a>
         <a class="back" href="projects.html">VOLTAR AOS PROJETOS</a>
    </div>
</body>
</html>
